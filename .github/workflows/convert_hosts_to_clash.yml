name: Convert Hosts to Mihomo Rules

on:
  schedule:
    - cron: "0 22 * * *"  # 北京时间 06:00 对应 UTC 时间 22:00
  workflow_dispatch:

jobs:
  convert-hosts:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Download hosts file
      run: curl -o StevenBlack_hosts https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts

    - name: Install mihomo
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        case "$(uname -m)" in
        'x86_64') ARCH='amd64' ;;
        'x86' | 'i686' | 'i386') ARCH='386' ;;
        'aarch64' | 'arm64') ARCH='arm64' ;;
        'armv7l') ARCH='armv7' ;;
        'riscv64') ARCH='riscv64' ;;
        's390x') ARCH='s390x' ;;
        *) ARCH='unknown' ;;
        esac
        echo "The architecture is: $ARCH"
        [ "$ARCH" = 'unknown' ] || {
          MIHOMO_VER=$(wget -q -O - 'https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/version.txt')
          MIHOMO_URL='https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/mihomo-linux-'$ARCH'-'$MIHOMO_VER'.deb'
          wget -q -O ./mihomo.deb "$MIHOMO_URL"
          sudo apt-get install ./mihomo.deb
          rm -f ./mihomo.deb
        }

    - name: Convert hosts to Mihomo rules
      run: |
        if [ "$(which mihomo 2>/dev/null)"x = 'x' ]; then
          echo 'mihomo not available.'
          exit 1
        else
          echo 'Converting hosts to Mihomo rules...'
          mihomo convert-ruleset domain hosts ./StevenBlack_hosts ./StevenBlack.mrs
          sha256sum ./StevenBlack.mrs
        fi

    - name: Commit and push changes
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git remote set-url origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
        git add StevenBlack.mrs
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          current_date=$(date +'%Y-%m-%d')
          git commit -m "Update Mihomo rules from hosts file on $current_date"
          git push
        fi
